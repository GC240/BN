<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NewsFeed</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #e8eaed;
  --white:     #ffffff;
  --border:    #e2e4e8;
  --border-lt: #eeeeee;
  --text:      #1c1c2e;
  --body:      #444444;
  --sub:       #666666;
  --muted:     #999999;
  --tag-bg:    #f0f0f0;
  --tag-bd:    #d8d8d8;
  --font:      'Inter', sans-serif;
}

html, body {
  height: 100%;
  min-height: 100vh;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--body);
  font-size: 13px;
  line-height: 1.5;
  padding: 20px;
}

/* ── Full-width widget ── */
.widget {
  width: 100%;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}

/* ── Header ── */
.widget-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-lt);
}

.widget-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}

.widget-controls {
  display: flex;
  align-items: center;
  gap: 5px;
}

.icon-btn {
  width: 28px;
  height: 28px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--white);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: #aaa;
  transition: all 0.12s;
}
.icon-btn:hover { background: #f5f5f5; color: var(--sub); border-color: #ccc; }
.icon-btn svg { width: 13px; height: 13px; }

/* ── Subbar ── */
.subbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 16px;
  background: #fafafa;
  border-bottom: 1px solid var(--border-lt);
  font-size: 11px;
  color: var(--muted);
}

.subbar-left { display: flex; align-items: center; gap: 5px; }
.subbar-left svg { width: 11px; height: 11px; flex-shrink: 0; }

/* ── News cards ── */
.news-card {
  display: flex;
  gap: 14px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border-lt);
  transition: background 0.1s;
}
.news-card:last-child { border-bottom: none; }
.news-card:hover { background: #fafbfc; }

/* Thumbnail */
.thumb {
  width: 64px;
  height: 56px;
  border-radius: 4px;
  background: #e8eaed;
  border: 1px solid var(--border-lt);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  overflow: hidden;
}

/* Card body — fills remaining width */
.card-body {
  flex: 1;
  min-width: 0;
}

.headline {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.4;
  margin-bottom: 7px;
  /* Allow headline to wrap fully */
  word-break: break-word;
}

.badge-row {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 6px;
  flex-wrap: wrap;
}

.tag-badge {
  height: 20px;
  padding: 0 9px;
  background: var(--tag-bg);
  border: 1px solid var(--tag-bd);
  border-radius: 20px;
  font-size: 10.5px;
  font-weight: 500;
  color: var(--sub);
  cursor: pointer;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  transition: background 0.1s;
  user-select: none;
}
.tag-badge:hover { background: #e3e3e3; }

.country-pill {
  height: 20px;
  padding: 0 8px;
  background: #f5f5f5;
  border: 1px solid var(--border-lt);
  border-radius: 20px;
  font-size: 10px;
  color: var(--muted);
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
}

.meta-row {
  display: flex;
  align-items: center;
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 6px;
}
.meta-source { font-weight: 500; color: var(--sub); }
.meta-pipe {
  display: inline-block;
  width: 1px; height: 10px;
  background: #d0d0d0;
  margin: 0 7px;
  flex-shrink: 0;
}

.preview {
  font-size: 12px;
  color: var(--sub);
  line-height: 1.65;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 8px;
}

.view-more {
  font-size: 12px;
  font-weight: 500;
  color: var(--body);
  cursor: pointer;
  border-bottom: 1px solid var(--body);
  padding-bottom: 1px;
  display: inline;
  transition: color 0.1s;
  user-select: none;
}
.view-more:hover { color: #111; border-color: #111; }

.no-results {
  padding: 52px 20px;
  text-align: center;
  font-size: 12px;
  color: var(--muted);
  line-height: 2;
}

/* ════════════════════════
   FILTER DRAWER
════════════════════════ */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.2);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.overlay.open { opacity: 1; pointer-events: auto; }

.drawer {
  position: fixed;
  top: 0; right: 0;
  height: 100vh;
  width: 280px;
  background: var(--white);
  z-index: 101;
  transform: translateX(100%);
  transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
  display: flex;
  flex-direction: column;
  box-shadow: -2px 0 16px rgba(0,0,0,0.1);
}
.drawer.open { transform: translateX(0); }

.drawer-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 15px 16px 13px;
  border-bottom: 1px solid var(--border);
}
.drawer-head h2 { font-size: 14px; font-weight: 600; color: var(--text); }

.drawer-close {
  width: 24px; height: 24px;
  border: none; background: none;
  font-size: 15px; cursor: pointer;
  color: #aaa; border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.1s;
}
.drawer-close:hover { background: #f0f0f0; color: var(--body); }

.drawer-body {
  flex: 1;
  overflow-y: auto;
  padding: 14px 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.filter-group { display: flex; flex-direction: column; gap: 4px; }
.filter-label { font-size: 11px; font-weight: 500; color: var(--sub); }

.sel-wrap { position: relative; }
.filter-select {
  width: 100%;
  height: 34px;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 0 28px 0 9px;
  font-family: var(--font);
  font-size: 12px;
  color: var(--sub);
  background: var(--white);
  appearance: none;
  -webkit-appearance: none;
  cursor: pointer;
  outline: none;
  transition: border-color 0.12s;
}
.filter-select:focus { border-color: #aaa; }
.sel-wrap::after {
  content: '';
  position: absolute;
  right: 9px; top: 50%;
  transform: translateY(-50%);
  border-left: 4px solid transparent;
  border-right: 4px solid transparent;
  border-top: 5px solid #aaa;
  pointer-events: none;
}

.drawer-foot {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
}
.btn-apply {
  flex: 1; height: 34px;
  background: #444; color: #fff;
  border: none; border-radius: 4px;
  font-family: var(--font); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: background 0.12s;
}
.btn-apply:hover { background: #222; }
.btn-clear {
  flex: 1; height: 34px;
  background: var(--white); color: var(--body);
  border: 1px solid #ccc; border-radius: 4px;
  font-family: var(--font); font-size: 13px;
  cursor: pointer; transition: all 0.12s;
}
.btn-clear:hover { border-color: #aaa; background: #f7f7f7; }

/* ════════════════════════
   MODAL
════════════════════════ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(150,150,150,0.3);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.18s;
}
.modal-overlay.open { opacity: 1; pointer-events: auto; }

.modal {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 6px;
  width: 100%;
  max-width: 600px;
  max-height: 86vh;
  overflow-y: auto;
  transform: translateY(8px);
  transition: transform 0.2s;
  box-shadow: 0 6px 28px rgba(0,0,0,0.12);
}
.modal-overlay.open .modal { transform: translateY(0); }

.modal-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  padding: 15px 16px 12px;
  border-bottom: 1px solid var(--border-lt);
  position: sticky; top: 0;
  background: var(--white);
  z-index: 1;
}
.modal-headline {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.45;
  flex: 1;
}
.modal-close {
  width: 24px; height: 24px;
  border: none; background: none;
  font-size: 15px; cursor: pointer;
  color: #aaa; border-radius: 4px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.1s;
}
.modal-close:hover { background: #f0f0f0; color: var(--body); }

.modal-meta {
  padding: 8px 16px;
  background: #fafafa;
  border-bottom: 1px solid var(--border-lt);
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 4px;
  font-size: 11px;
  color: var(--muted);
}
.modal-meta .m-source { font-weight: 600; color: var(--sub); }
.modal-meta .m-pill {
  background: var(--tag-bg);
  border: 1px solid var(--tag-bd);
  border-radius: 20px;
  padding: 1px 7px;
  font-size: 10px;
  color: var(--sub);
}

.modal-body { padding: 16px; }

.section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}

.modal-text {
  font-size: 12.5px;
  color: var(--sub);
  line-height: 1.75;
  margin-bottom: 18px;
}

.highlights {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.highlights li {
  font-size: 12px;
  color: var(--body);
  padding: 7px 10px 7px 11px;
  background: #f8f8f8;
  border-left: 2px solid #cccccc;
  border-radius: 0 4px 4px 0;
  line-height: 1.55;
}

/* ── Spin ── */
@keyframes spin { to { transform: rotate(360deg); } }
.spinning { animation: spin 0.42s linear; }
</style>
</head>

<!-- ══ NewsFeed Widget — full width ══ -->
<div class="widget">

          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
      </button>
      <button class="icon-btn" title="Filter" onclick="openDrawer()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="4" y1="6" x2="20" y2="6"/>
          <line x1="8" y1="12" x2="16" y2="12"/>
          <line x1="11" y1="18" x2="13" y2="18"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="subbar">
    <div class="subbar-left">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      Last updated:&nbsp;<span id="timestamp">—</span>
    </div>
    <span id="results-count"></span>
  </div>

  <div id="news-container"></div>
</div>


<!-- ══ Filter Drawer ══ -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-head">

      <label class="filter-label" for="f-topic">Topic</label>

          <option>ESG</option>

      </div>

    <div class="filter-group">

        <select class="filter-select" id="f-type">

          <option>News Summary</option>
          <option>Market Alert</option>
          <option>Regulatory Update</option>
          <option>Analysis</option>
        </select>
      </div>
    </div>

    <div class="filter-group">
      <label class="filter-label" for="f-country">Location</label>

        <select class="filter-select" id="f-country">

          <option>Malaysia</option>
          <option>Singapore</option>
          <option>Indonesia</option>
          <option>Thailand</option>
          <option>Vietnam</option>
          <option>Philippines</option>
          <option>Regional</option>
        </select>
      </div>
    </div>

    <div class="filter-group">
      <label class="filter-label" for="f-company">Company</label>
      <div class="sel-wrap">
        <select class="filter-select" id="f-company">
          <option value="">All Companies</option>
          <option>Petronas</option>
          <option>Pertamina</option>
          <option>PTT</option>
          <option>PetroVietnam</option>
          <option>Shell</option>
          <option>TotalEnergies</option>
          <option>Multiple</option>
        </select>
      </div>
    </div>

    <div class="filter-group">
      <label class="filter-label" for="f-industry">Industry</label>
      <div class="sel-wrap">
        <select class="filter-select" id="f-industry">
          <option value="">All Industries</option>
          <option value="Oil & Gas">Oil &amp; Gas</option>
          <option>Energy</option>
          <option>Petrochemicals</option>
        </select>
      </div>
    </div>

    <div class="filter-group">
      <label class="filter-label" for="f-source">Source</label>
      <div class="sel-wrap">
        <select class="filter-select" id="f-source">
          <option value="">All Sources</option>
          <option>Reuters Energy</option>
          <option>S&amp;P Global Platts</option>
          <option>Argus Media</option>
          <option>BERNAMA</option>
          <option>Bloomberg Energy</option>
          <option>Upstream Online</option>
        </select>
      </div>
    </div>

  </div>
  <div class="drawer-foot">
    <button class="btn-apply" onclick="applyFilters()">Apply</button>
    <button class="btn-clear" onclick="clearFilters()">Clear</button>
  </div>
</aside>


<!-- ══ Summary Modal ══ -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-head">
      <div class="modal-headline" id="modal-headline"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-meta" id="modal-meta"></div>
    <div class="modal-body">
      <div class="section-label">Full Summary</div>
      <p class="modal-text" id="modal-text"></p>
      <div class="section-label">Key Highlights</div>
      <ul class="highlights" id="modal-highlights"></ul>
    </div>
  </div>
</div>

let filtered = [...DATA];

function ts(d) {
  return d.toLocaleDateString('en-US',{month:'2-digit',day:'2-digit',year:'numeric'})
    + ' ' + d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});
}

function renderNews(data) {
  const c = document.getElementById('news-container');
  document.getElementById('results-count').textContent =
    data.length + ' result' + (data.length !== 1 ? 's' : '');

  if (!data.length) {
    c.innerHTML = '<div class="no-results">No items match the selected filters.<br>Try adjusting or clearing your criteria.</div>';
    return;
  }

  c.innerHTML = data.map(item => `
    <div class="news-card">
      <div class="thumb">${item.emoji}</div>
      <div class="card-body">
        <div class="headline">${item.headline}</div>
        <div class="badge-row">
          <span class="tag-badge" onclick="openModal(${item.id})">${item.contentType}</span>
          <span class="country-pill">${item.country}</span>
        </div>
        <div class="meta-row">
          <span class="meta-source">${item.source}</span>
          <span class="meta-pipe"></span>
          <span>${item.date}</span>
        </div>
        <div class="preview">${item.summary}</div>
        <span class="view-more" onclick="openModal(${item.id})">View More</span>
      </div>
    </div>
  `).join('');
}

function applyFilters() {
  const v = id => document.getElementById(id).value;
  const topic=v('f-topic'), type=v('f-type'), country=v('f-country'),
        company=v('f-company'), industry=v('f-industry'), source=v('f-source');
  filtered = DATA.filter(i => {
    if (topic   && i.topic       !== topic)   return false;
    if (type    && i.contentType !== type)    return false;
    if (country && i.country     !== country) return false;
    if (company && i.company     !== company) return false;
    if (industry && i.industry   !== industry) return false;
    if (source  && i.source      !== source)  return false;
    return true;
  });
  renderNews(filtered);
  closeDrawer();
}

function clearFilters() {
  ['f-topic','f-type','f-country','f-company','f-industry','f-source']
    .forEach(id => document.getElementById(id).value = '');
  filtered = [...DATA];
  renderNews(filtered);
  closeDrawer();
}

function refreshFeed() {
  const icon = document.getElementById('refresh-icon');
  icon.classList.add('spinning');
  setTimeout(() => icon.classList.remove('spinning'), 420);
  document.getElementById('timestamp').textContent = ts(new Date());
  renderNews(filtered);
}

function openDrawer() {
  document.getElementById('drawer').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

function openModal(id) {
  const item = DATA.find(n => n.id === id);
  if (!item) return;
  document.getElementById('modal-headline').textContent = item.headline;
  document.getElementById('modal-meta').innerHTML =
    `<span class="m-source">${item.source}</span>
     <span style="width:1px;height:10px;background:#ddd;display:inline-block;margin:0 6px;vertical-align:middle;"></span>
     <span>${item.date}</span>
     <span style="width:1px;height:10px;background:#ddd;display:inline-block;margin:0 6px;vertical-align:middle;"></span>
     <span class="m-pill">${item.country}</span>
     <span class="m-pill">${item.topic}</span>`;
  document.getElementById('modal-text').textContent = item.fullText;
  document.getElementById('modal-highlights').innerHTML =
    item.highlights.map(h => `<li>${h}</li>`).join('');
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeDrawer(); }
});

document.getElementById('timestamp').textContent = ts(new Date());
renderNews(DATA);
</script>
